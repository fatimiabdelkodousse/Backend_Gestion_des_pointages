# ══════════════════════════════════
# 🌐 Server
# ══════════════════════════════════
server.port=${PORT:8080}
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=3
server.tomcat.max-connections=100
server.tomcat.accept-count=20
server.error.include-message=always

# ══════════════════════════════════
# 🗄️ Database
# ══════════════════════════════════
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.connection-timeout=20000

# ══════════════════════════════════
# 🔧 JPA / Hibernate
# ══════════════════════════════════
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.generate_statistics=false

# ══════════════════════════════════
# 📧 SendGrid
# ══════════════════════════════════
sendgrid.api-key=${SENDGRID_API_KEY}
sendgrid.from-email=${SENDGRID_FROM_EMAIL}

# ══════════════════════════════════
# 🔐 JWT
# ══════════════════════════════════
security.jwt.secret=${SECURITY_JWT_SECRET}
security.jwt.expiration-minutes=15

# ══════════════════════════════════
# 🚀 Performance
# ══════════════════════════════════
spring.main.lazy-initialization=true

# ══════════════════════════════════
# 📝 Logging
# ══════════════════════════════════
logging.level.root=WARN
logging.level.com.example.gestionpointage=INFO
logging.level.org.springframework=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.apache.tomcat=WARN
logging.level.org.apache.catalina=WARN